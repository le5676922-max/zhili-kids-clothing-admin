<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知 - 织里镇童装产业协同管理平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .notif-page { padding: 20px 0 40px; min-height: 500px; }
        .notif-title { font-size: 24px; font-weight: 600; color: var(--primary-color); margin: 0 0 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .notif-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; }
        .notif-empty { text-align: center; padding: 60px 20px; color: #999; }
        .notif-empty i { font-size: 48px; margin-bottom: 16px; color: #ddd; }
        .notif-empty p { margin: 0 0 20px 0; font-size: 15px; }

        .notif-list { margin-top: 10px; }
        .notif-item { display: flex; gap: 14px; padding: 16px 20px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 0.2s; }
        .notif-item:hover { background: #fafafa; }
        .notif-item:last-child { border-bottom: none; }
        .notif-item.unread { background: #f0f7ff; }
        .notif-item.unread:hover { background: #e8f1fa; }

        .notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .notif-icon.supply_connection { background: #e8f4fd; color: #2196f3; }
        .notif-icon.connection { background: #e8f4fd; color: #2196f3; }
        .notif-icon.order { background: #fef3e2; color: #ff9800; }
        .notif-icon.job { background: #e8f5e9; color: #4caf50; }
        .notif-icon.default { background: #f5f5f5; color: #999; }

        .notif-body { flex: 1; min-width: 0; }
        .notif-item-title { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 4px; }
        .notif-item .unread .notif-item-title { font-weight: 600; }
        .notif-item-content { font-size: 13px; color: #888; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .notif-item-time { font-size: 12px; color: #bbb; }
        .notif-read-dot { width: 8px; height: 8px; border-radius: 50%; background: #2196f3; flex-shrink: 0; margin-top: 6px; }

        .notif-link-arrow { flex-shrink: 0; margin-top: 10px; color: #ccc; font-size: 14px; }
        .notif-item.has-link:hover .notif-link-arrow { color: var(--primary-color); }

        .btn-mark-all-read { padding: 8px 16px; font-size: 13px; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #666; }
        .btn-mark-all-read:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../images/logo.png" alt="织里镇童装产业协同管理平台">
                <h1>织里镇童装产业协同管理平台</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="enterprise.html">企业信息</a></li>
                    <li><a href="supply-chain.html">供应链协同</a></li>
                    <li><a href="product.html">产品展示</a></li>
                    <li><a href="market.html">市场信息</a></li>
                    <li><a href="recruitment.html">人才招聘</a></li>
                    <li><a href="training.html">人才培育</a></li>
                    <li><a href="data-center.html">数据中心</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <div class="user-info-guest">
                    <a href="login.html" class="btn btn-login">登录</a>
                    <a href="register.html" class="btn btn-register">注册</a>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumb container">
        <a href="../index.html">首页</a> &gt; 消息通知
    </div>

    <main class="container notif-page">
        <div class="notif-title">
            <span>消息通知</span>
            <button class="btn-mark-all-read" id="markAllReadBtn" onclick="markAllAsRead()" style="display:none;">全部标为已读</button>
        </div>
        <div class="notif-card">
            <div class="loading" id="notifContent">
                <i class="bi bi-arrow-repeat"></i>
                <p>加载中...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 织里镇童装产业协同管理平台 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="../js/auth-header.js"></script>
    <script src="../js/common.js"></script>
    <script>
        function getApiBase() {
            return window.ZhiliApi ? window.ZhiliApi.apiAuth() : 'http://localhost:8080/api/auth';
        }

        function getToken() {
            return localStorage.getItem('token') || sessionStorage.getItem('token') || '';
        }

        function getIconClass(type) {
            var map = {
                'supply_connection_created': 'supply_connection',
                'connection_status_changed': 'connection',
                'job_application_received': 'job',
                'job_application_status_changed': 'job',
                'order_completed': 'order',
                'order_status_changed': 'order',
                'refund_request': 'order',
                'refund_approved': 'order',
                'refund_rejected': 'order',
                'refund_completed': 'order',
                'refund_status_changed': 'order'
            };
            return map[type] || 'default';
        }

        function getIcon(type) {
            var map = {
                'supply_connection_created': 'bi-link-45deg',
                'connection_status_changed': 'bi-arrow-left-right',
                'job_application_received': 'bi-person-badge',
                'job_application_status_changed': 'bi-person-check',
                'order_completed': 'bi-bag-check',
                'order_status_changed': 'bi-truck',
                'refund_request': 'bi-arrow-return-left',
                'refund_approved': 'bi-check-circle',
                'refund_rejected': 'bi-x-circle',
                'refund_completed': 'bi-check2-circle',
                'refund_status_changed': 'bi-arrow-return-left'
            };
            return map[type] || 'bi-bell';
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            var now = new Date();
            var diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 172800000) return '昨天';
            var month = (d.getMonth() + 1).toString().padStart(2, '0');
            var day = d.getDate().toString().padStart(2, '0');
            return month + '-' + day;
        }

        function loadNotifications() {
            var container = document.getElementById('notifContent');
            if (!container) return;

            var token = getToken();
            if (!token) {
                container.innerHTML = '<div class="notif-empty"><i class="bi bi-bell"></i><p>请先登录</p><a href="login.html" class="btn btn-login">去登录</a></div>';
                return;
            }

            container.innerHTML = '<div class="loading"><i class="bi bi-arrow-repeat"></i><p>加载中...</p></div>';

            var apiBase = getApiBase();
            fetch(apiBase + '/notifications', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function (res) { return res.json(); })
            .then(function (result) {
                if (result.code === 200 && result.data && result.data.length > 0) {
                    renderNotifications(result.data);
                } else {
                    container.innerHTML = '<div class="notif-empty"><i class="bi bi-bell"></i><p>暂无消息通知</p></div>';
                }
            })
            .catch(function () {
                container.innerHTML = '<div class="notif-empty"><i class="bi bi-bell"></i><p>加载失败，请稍后重试</p></div>';
            });
        }

        function renderNotifications(list) {
            var container = document.getElementById('notifContent');
            var hasUnread = false;
            var html = '<div class="notif-list">';

            for (var i = 0; i < list.length; i++) {
                var n = list[i];
                var isUnread = n.isRead === 0 || n.isRead === false;
                if (isUnread) hasUnread = true;

                var iconClass = getIconClass(n.type || '');
                var icon = getIcon(n.type || '');
                var targetUrl = n.targetUrl || '';

                html += '<div class="notif-item' + (isUnread ? ' unread' : '') + (targetUrl ? ' has-link' : '') + '" onclick="handleNotifClick(this, ' + n.id + ', \'' + targetUrl + '\')" data-id="' + n.id + '" data-url="' + targetUrl + '">';
                html += '<div class="notif-icon ' + iconClass + '"><i class="bi ' + icon + '"></i></div>';
                html += '<div class="notif-body">';
                html += '<div class="notif-item-title">' + (n.title || '通知') + '</div>';
                html += '<div class="notif-item-content">' + (n.content || '') + '</div>';
                html += '<div class="notif-item-time">' + formatTime(n.createdAt) + '</div>';
                html += '</div>';
                if (isUnread) {
                    html += '<div class="notif-read-dot"></div>';
                }
                if (targetUrl) {
                    html += '<div class="notif-link-arrow"><i class="bi bi-chevron-right"></i></div>';
                }
                html += '</div>';
            }

            html += '</div>';
            container.innerHTML = html;

            var markBtn = document.getElementById('markAllReadBtn');
            if (markBtn) {
                markBtn.style.display = hasUnread ? 'inline-block' : 'none';
            }
        }

        function handleNotifClick(element, id, targetUrl) {
            // 先标记已读
            markAsRead(id, element);
            // 如果有跳转地址，则跳转
            if (targetUrl) {
                window.location.href = targetUrl;
            }
        }

        function markAsRead(id, element) {
            var token = getToken();
            if (!token) return;

            var apiBase = getApiBase();
            fetch(apiBase + '/notifications/' + id + '/read', {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function (res) { return res.json(); })
            .then(function (result) {
                if (result.code === 200) {
                    if (element) {
                        element.classList.remove('unread');
                        var dot = element.querySelector('.notif-read-dot');
                        if (dot) dot.remove();
                    }
                    var anyUnread = document.querySelectorAll('.notif-item.unread').length > 0;
                    var markBtn = document.getElementById('markAllReadBtn');
                    if (markBtn) {
                        markBtn.style.display = anyUnread ? 'inline-block' : 'none';
                    }
                    if (typeof updateNavUnreadCount === 'function') {
                        updateNavUnreadCount();
                    }
                }
            })
            .catch(function () {});
        }

        function markAllAsRead() {
            var token = getToken();
            if (!token) return;

            var apiBase = getApiBase();
            fetch(apiBase + '/notifications/read-all', {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function (res) { return res.json(); })
            .then(function (result) {
                if (result.code === 200) {
                    var items = document.querySelectorAll('.notif-item.unread');
                    for (var i = 0; i < items.length; i++) {
                        items[i].classList.remove('unread');
                        var dot = items[i].querySelector('.notif-read-dot');
                        if (dot) dot.remove();
                    }
                    var markBtn = document.getElementById('markAllReadBtn');
                    if (markBtn) markBtn.style.display = 'none';
                    if (typeof updateNavUnreadCount === 'function') {
                        updateNavUnreadCount();
                    }
                }
            })
            .catch(function () {});
        }

        loadNotifications();
    </script>
</body>
</html>
