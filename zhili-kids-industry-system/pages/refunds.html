<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退款/售后 - 织里镇童装产业协同管理平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .refund-page { padding: 20px 0 40px; min-height: 500px; }
        .refund-title { font-size: 24px; font-weight: 600; color: var(--primary-color); margin: 0 0 20px 0; }
        .refund-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; }
        .empty-refund { text-align: center; padding: 60px 20px; color: #999; }
        .empty-refund i { font-size: 48px; margin-bottom: 16px; color: #ddd; }
        .empty-refund p { margin: 0 0 20px 0; font-size: 15px; }
        .btn-go-shopping { display: inline-block; padding: 10px 24px; background: var(--primary-color); color: #fff; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .btn-go-shopping:hover { background: var(--secondary-color); color: #fff; }

        .refund-list { margin-top: 20px; }
        .refund-item { border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .refund-header { background: #f9f9f9; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .refund-id { font-size: 14px; color: #666; }
        .refund-id span { color: #333; font-weight: 500; }
        .refund-status { font-size: 14px; font-weight: 500; }
        .refund-status.pending { color: #ff9800; }
        .refund-status.approved { color: #2196f3; }
        .refund-status.rejected { color: #f44336; }
        .refund-status.completed { color: #4caf50; }
        .refund-status.cancelled { color: #9e9e9e; }

        .refund-body { padding: 20px; }
        .refund-order-info { background: #f5f9ff; padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; }
        .refund-order-info p { margin: 4px 0; font-size: 14px; color: #333; }
        .refund-reason { font-size: 15px; color: #333; margin: 12px 0; }
        .refund-reason strong { color: #f44336; }
        .refund-amount { font-size: 18px; font-weight: 600; color: #f44336; margin: 12px 0; }
        .refund-desc { font-size: 14px; color: #666; margin-top: 8px; }
        .refund-time { font-size: 13px; color: #999; margin-top: 8px; }

        .refund-footer { background: #f9f9f9; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-refund { padding: 6px 16px; font-size: 13px; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #666; }
        .btn-refund:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-refund.danger { color: #f44336; border-color: #f44336; }
        .btn-refund.danger:hover { background: #f44336; color: #fff; }

        .loading { text-align: center; padding: 40px; color: #999; }
        
        /* 退款申请模态框 */
        .refund-modal {
            position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
        }
        .refund-modal-content {
            background: #fff; border-radius: 8px; width: 90%; max-width: 600px;
            max-height: 90vh; overflow-y: auto; padding: 20px; position: relative;
        }
        .refund-modal-content h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        .form-group label span { color: #f44336; }
        .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 14px; box-sizing: border-box;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-color); }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel { padding: 10px 20px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-submit { padding: 10px 20px; border: none; background: var(--primary-color); color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-submit:hover { background: var(--secondary-color); }
        .close-modal {
            position: absolute; top: 10px; right: 15px; font-size: 24px;
            cursor: pointer; color: #999;
        }
        .close-modal:hover { color: #333; }
        
        /* 标签页 */
        .refund-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .refund-tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 14px; background: #fff; }
        .refund-tab.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../images/logo.png" alt="织里镇童装产业协同管理平台">
                <h1>织里镇童装产业协同管理平台</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="enterprise.html">企业信息</a></li>
                    <li><a href="supply-chain.html">供应链协同</a></li>
                    <li><a href="product.html">产品展示</a></li>
                    <li><a href="market.html">市场信息</a></li>
                    <li><a href="recruitment.html">人才招聘</a></li>
                    <li><a href="training.html">人才培育</a></li>
                    <li><a href="data-center.html">数据中心</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <div class="user-info-guest">
                    <a href="login.html" class="btn btn-login">登录</a>
                    <a href="register.html" class="btn btn-register">注册</a>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumb container">
        <a href="../index.html">首页</a> &gt; <a href="orders.html">我的订单</a> &gt; 退款/售后
    </div>

    <main class="container refund-page">
        <h1 class="refund-title">退款/售后</h1>
        <div class="refund-card">
            <div class="refund-tabs">
                <button class="refund-tab active" data-tab="all">全部申请</button>
                <button class="refund-tab" data-tab="pending">待处理</button>
                <button class="refund-tab" data-tab="completed">已完成</button>
            </div>
            <div class="loading" id="refundContent">
                <i class="bi bi-arrow-repeat"></i>
                <p>加载中...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 织里镇童装产业协同管理平台 版权所有</p>
            </div>
        </div>
    </footer>

    <!-- 退款申请模态框 -->
    <div class="refund-modal" id="refundModal" style="display:none;">
        <div class="refund-modal-content">
            <span class="close-modal" onclick="closeRefundModal()"><i class="bi bi-x-lg"></i></span>
            <h2>申请退款</h2>
            <div class="form-group">
                <label>订单号：<span id="modalOrderId"></span></label>
            </div>
            <div class="form-group">
                <label>退款金额：<span id="modalRefundAmount" style="color:#f44336;font-weight:bold;"></span></label>
            </div>
            <div class="form-group">
                <label>退款类型 <span>*</span></label>
                <select id="refundType">
                    <option value="refund">仅退款（未收到货）</option>
                    <option value="return">退货退款（已收到货）</option>
                </select>
            </div>
            <div class="form-group">
                <label>退款原因 <span>*</span></label>
                <select id="refundReason">
                    <option value="">请选择退款原因</option>
                    <option value="不想要了">不想要了</option>
                    <option value="商品损坏">商品损坏</option>
                    <option value="尺寸不合适">尺寸不合适</option>
                    <option value="颜色/款式与描述不符">颜色/款式与描述不符</option>
                    <option value="收到商品与订单不符">收到商品与订单不符</option>
                    <option value="质量问题">质量问题</option>
                    <option value="物流太慢">物流太慢</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>详细说明</label>
                <textarea id="refundDescription" placeholder="请详细描述您的问题（选填）"></textarea>
            </div>
            <div class="form-actions">
                <button class="btn-cancel" onclick="closeRefundModal()">取消</button>
                <button class="btn-submit" onclick="submitRefund()">提交申请</button>
            </div>
        </div>
    </div>

    <script src="../js/auth-header.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const API_BASE = window.ZhiliApi.apiAuth();
        let currentFilter = 'all';
        let allRefunds = [];

        function getToken() {
            return localStorage.getItem('token');
        }

        function getStatusText(status) {
            const statusMap = {
                'pending': '待审核',
                'approved': '审核通过',
                'rejected': '审核拒绝',
                'completed': '已完成',
                'cancelled': '已取消'
            };
            return statusMap[status] || status;
        }

        function checkLogin() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html?redirect=refunds.html';
                return false;
            }
            return true;
        }

        function loadRefunds() {
            if (!checkLogin()) return;
            const token = getToken();
            const container = document.getElementById('refundContent');
            
            fetch(API_BASE + '/refunds', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    allRefunds = data.data || [];
                    renderRefunds();
                } else {
                    container.innerHTML = '<div class="empty-refund"><i class="bi bi-exclamation-triangle"></i><p>加载失败，请稍后重试</p></div>';
                }
            })
            .catch(err => {
                console.error('加载退款申请失败:', err);
                container.innerHTML = '<div class="empty-refund"><i class="bi bi-exclamation-triangle"></i><p>加载失败，请稍后重试</p></div>';
            });
        }

        function renderRefunds() {
            const container = document.getElementById('refundContent');
            let filteredRefunds = allRefunds;
            
            if (currentFilter === 'pending') {
                filteredRefunds = allRefunds.filter(r => r.status === 'pending' || r.status === 'approved');
            } else if (currentFilter === 'completed') {
                filteredRefunds = allRefunds.filter(r => r.status === 'completed');
            }
            
            if (filteredRefunds.length === 0) {
                container.innerHTML = `
                    <div class="empty-refund">
                        <i class="bi bi-box-seam"></i>
                        <p>暂无退款申请</p>
                        <a href="orders.html" class="btn-go-shopping">查看订单</a>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="refund-list">';
            filteredRefunds.forEach(refund => {
                const order = refund.order || {};
                const items = order.items || [];
                const itemsText = items.map(i => i.productName).join('、');
                
                let statusClass = refund.status;
                if (refund.status === 'approved') statusClass = 'approved';
                
                let footerHtml = '';
                if (refund.status === 'pending') {
                    footerHtml = `<button class="btn-refund danger" onclick="cancelRefund('${refund.id}')">取消申请</button>`;
                }
                if (refund.status === 'rejected') {
                    footerHtml = `<button class="btn-refund" onclick="viewRefundDetail('${refund.id}')">查看详情</button>`;
                }
                
                html += `
                    <div class="refund-item">
                        <div class="refund-header">
                            <div class="refund-id">退款单号: <span>${refund.refundNo}</span></div>
                            <div class="refund-status ${statusClass}">${getStatusText(refund.status)}</div>
                        </div>
                        <div class="refund-body">
                            <div class="refund-order-info">
                                <p><strong>订单号：</strong>${refund.orderId || '-'}</p>
                                <p><strong>退款类型：</strong>${refund.refundType === 'refund' ? '仅退款' : '退货退款'}</p>
                            </div>
                            <div class="refund-amount">退款金额：¥${(refund.refundAmount || 0).toFixed(2)}</div>
                            <div class="refund-reason"><strong>退款原因：</strong>${refund.reason}</div>
                            ${refund.description ? '<div class="refund-desc">详细说明：' + refund.description + '</div>' : ''}
                            <div class="refund-time">申请时间：${refund.createdAt ? new Date(refund.createdAt).toLocaleString('zh-CN') : '-'}</div>
                            ${refund.sellerNote ? '<div class="refund-desc">商家备注：' + refund.sellerNote + '</div>' : ''}
                        </div>
                        <div class="refund-footer">
                            <div></div>
                            <div class="order-actions">${footerHtml}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 标签页切换
        document.querySelectorAll('.refund-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.refund-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.tab;
                renderRefunds();
            });
        });

        // 取消退款申请
        function cancelRefund(refundId) {
            if (!confirm('确定要取消该退款申请吗？')) return;
            
            const token = getToken();
            fetch(API_BASE + '/refunds/' + refundId, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    alert('退款申请已取消');
                    loadRefunds();
                } else {
                    alert(data.message || '取消失败');
                }
            })
            .catch(err => {
                console.error('取消失败:', err);
                alert('取消失败，请稍后重试');
            });
        }

        // 查看退款详情
        function viewRefundDetail(refundId) {
            const refund = allRefunds.find(r => r.id === refundId);
            if (refund) {
                alert('退款详情：\n\n退款单号：' + refund.id + '\n订单号：' + (refund.order ? refund.order.id : '-') + '\n退款金额：¥' + (refund.refundAmount || 0).toFixed(2) + '\n退款原因：' + refund.reason + '\n状态：' + refund.statusText);
            }
        }

        function closeRefundModal() {
            document.getElementById('refundModal').style.display = 'none';
        }

        function submitRefund() {
            const reason = document.getElementById('refundReason').value;
            const description = document.getElementById('refundDescription').value.trim();
            const type = document.getElementById('refundType').value;
            
            if (!reason) {
                alert('请选择退款原因');
                return;
            }
            
            const orderId = document.getElementById('modalOrderId').textContent;
            const token = getToken();
            
            fetch(API_BASE + '/refunds', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({
                    orderId: orderId,
                    refundType: type,
                    reason: reason,
                    description: description
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    alert('退款申请提交成功！');
                    closeRefundModal();
                    loadRefunds();
                } else {
                    alert(data.message || '提交失败');
                }
            })
            .catch(err => {
                console.error('提交失败:', err);
                alert('提交失败，请稍后重试');
            });
        }

        // 从 URL 获取参数
        function getUrlParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 弹出退款申请模态框（预填订单信息）
        function openRefundModal(orderId, amount) {
            document.getElementById('modalOrderId').textContent = orderId || '';
            document.getElementById('modalRefundAmount').textContent = amount ? '¥' + parseFloat(amount).toFixed(2) : '';
            document.getElementById('refundReason').value = '';
            document.getElementById('refundDescription').value = '';
            document.getElementById('refundType').value = 'refund';
            document.getElementById('refundModal').style.display = 'flex';
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function () {
            loadRefunds();

            // 检测是否有来自订单页的参数
            var orderId = getUrlParam('orderId');
            var amount = getUrlParam('amount');
            if (orderId) {
                openRefundModal(orderId, amount);
            }
        });
    </script>
</body>
</html>
