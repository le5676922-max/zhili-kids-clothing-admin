<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息 - 织里镇童装产业协同管理平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/recruitment.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .info-page { padding: 20px 0 40px; min-height: 600px; display: flex; flex-direction: column; }
        .info-layout { display: flex; gap: 20px; flex: 1; min-height: 500px; }
        .info-contacts { width: 280px; flex-shrink: 0; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; }
        .info-contacts-title { padding: 16px; font-size: 18px; font-weight: 600; color: #333; border-bottom: 1px solid #eee; }
        .info-contacts-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s; }
        .contact-item:hover { background: #f8f9fa; }
        .contact-item.active { background: #e8f4fd; border-left: 3px solid var(--primary-color); }
        .contact-item .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e0e0e0; object-fit: cover; }
        .contact-item .name { font-weight: 500; color: #333; }
        .contact-item .job-name { font-size: 12px; color: #999; margin-top: 2px; }
        .contact-item .last-msg { font-size: 12px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-item .avatar-wrap { position: relative; flex-shrink: 0; }
        .contact-item .avatar-unread-dot {
            position: absolute; top: -4px; right: -4px;
            min-width: 16px; height: 16px; line-height: 16px;
            background: #f56565; color: #fff; border-radius: 8px;
            font-size: 10px; font-weight: 700; text-align: center;
            border: 2px solid #fff; z-index: 1;
            animation: unreadPulse 1.5s ease-in-out infinite;
        }
        .contact-item .avatar-unread-dot.large { min-width: 22px; }
        @keyframes unreadPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .info-chat { flex: 1; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; display: flex; flex-direction: column; min-width: 0; }
        .info-chat-header { padding: 12px 16px; border-bottom: 1px solid #eee; font-weight: 600; color: #333; }
        .info-chat-header .job-tag { font-size: 12px; color: #999; font-weight: normal; margin-left: 8px; }
        .info-chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-item { max-width: 75%; align-self: flex-start; }
        .msg-item.from-me { align-self: flex-end; }
        .msg-item .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .msg-item .bubble { background: #f0f0f0; color: #333; }
        .msg-item.from-me .bubble { background: var(--primary-color); color: #fff; }
        .msg-item .time { font-size: 11px; color: #999; margin-top: 4px; }
        .msg-item.from-me .time { text-align: right; }
        .info-chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; }
        .info-chat-form { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .info-chat-form input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .info-chat-form button { padding: 10px 20px; background: var(--primary-color); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .info-chat-form button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .no-contacts { padding: 24px; text-align: center; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../images/logo.png" alt="织里镇童装产业协同管理平台">
                <h1>织里镇童装产业协同管理平台</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="enterprise.html">企业信息</a></li>
                    <li><a href="supply-chain.html">供应链协同</a></li>
                    <li><a href="product.html">产品展示</a></li>
                    <li><a href="market.html">市场信息</a></li>
                    <li><a href="recruitment.html">人才招聘</a></li>
                    <li><a href="training.html">人才培育</a></li>
                    <li><a href="data-center.html">数据中心</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <div class="user-info-guest">
                    <a href="login.html" class="btn btn-login">登录</a>
                    <a href="register.html" class="btn btn-register">注册</a>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumb container">
        <a href="../index.html">首页</a> &gt; <a href="recruitment.html">人才招聘</a> &gt; 信息
    </div>

    <main class="container info-page">
        <div class="info-layout">
            <aside class="info-contacts">
                <div class="info-contacts-title"><i class="bi bi-chat-dots"></i> 联系人</div>
                <div class="info-contacts-list" id="contactsList">
                    <div class="loading">加载中...</div>
                </div>
            </aside>
            <section class="info-chat">
                <div class="info-chat-header" id="chatHeader" style="display:none;">
                    <span id="chatTitle">选择联系人开始沟通</span>
                    <span class="job-tag" id="chatJobTag"></span>
                </div>
                <div class="info-chat-messages" id="chatMessages">
                    <div class="info-chat-empty" id="chatEmpty">请从左侧选择联系人或从招聘页点击「沟通」开始聊天</div>
                </div>
                <div class="info-chat-form" id="chatForm" style="display:none;">
                    <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
                    <button type="button" id="chatSend">发送</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 织里镇童装产业协同管理平台 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="../js/auth-header.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/job-info.js?v=20250321b"></script>
</body>
</html>
