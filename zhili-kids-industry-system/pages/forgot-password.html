<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 织里镇童装产业协同管理平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../images/logo.png" alt="织里镇童装产业协同管理平台">
                <h1>织里镇童装产业协同管理平台</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="enterprise.html">企业信息</a></li>
                    <li><a href="supply-chain.html">供应链协同</a></li>
                    <li><a href="product.html">产品展示</a></li>
                    <li><a href="market.html">市场信息</a></li>
                    <li><a href="recruitment.html">人才招聘</a></li>
                    <li><a href="training.html">人才培育</a></li>
                    <li><a href="data-center.html">数据中心</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <div class="user-info-guest">
                    <a href="login.html" class="btn btn-login">登录</a>
                    <a href="register.html" class="btn btn-register">注册</a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="forgot-password-container">
        <div class="forgot-password-box">
            <div class="forgot-password-header">
                <h2>找回密码</h2>
                <p>请输入注册时使用的邮箱，我们将发送验证码帮助您重置密码</p>
            </div>

            <!-- 步骤指示器 -->
            <div class="reset-steps">
                <div class="reset-step active" data-step="1">
                    <div class="reset-step-number">1</div>
                    <span>验证邮箱</span>
                </div>
                <div class="reset-step-line"></div>
                <div class="reset-step" data-step="2">
                    <div class="reset-step-number">2</div>
                    <span>重置密码</span>
                </div>
                <div class="reset-step-line"></div>
                <div class="reset-step" data-step="3">
                    <div class="reset-step-number">3</div>
                    <span>完成</span>
                </div>
            </div>

            <form class="forgot-password-form" id="forgotPasswordForm">
                <!-- 步骤1：输入邮箱获取验证码 -->
                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label for="reset-email">邮箱</label>
                        <div class="input-with-icon">
                            <i class="bi bi-envelope"></i>
                            <input type="email" id="reset-email" name="email" placeholder="请输入注册时使用的邮箱" required>
                        </div>
                    </div>
                    <button type="button" class="btn-primary btn-full" id="btnGetCode">获取验证码</button>
                    <button type="button" class="btn-primary btn-full btn-next-step" data-next="2" style="display:none;">下一步</button>
                </div>

                <!-- 步骤2：输入验证码和新密码 -->
                <div class="form-step" id="step2">
                    <div class="form-group">
                        <label for="reset-code">验证码</label>
                        <div class="input-with-icon input-with-btn">
                            <i class="bi bi-shield-check"></i>
                            <input type="text" id="reset-code" name="code" placeholder="请输入6位验证码" maxlength="6" required>
                            <button type="button" class="btn-get-code-inline" id="btnGetCodeAgain">重新获取</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="new-password">新密码</label>
                        <div class="input-with-icon">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="new-password" name="newPassword" placeholder="请输入新密码（8-20位）" required>
                            <i class="bi bi-eye-slash toggle-password" data-target="new-password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-new-password">确认新密码</label>
                        <div class="input-with-icon">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="confirm-new-password" name="confirmPassword" placeholder="请再次输入新密码" required>
                            <i class="bi bi-eye-slash toggle-password" data-target="confirm-new-password"></i>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary btn-prev-step" data-prev="1">上一步</button>
                        <button type="submit" class="btn-primary btn-reset-submit">重置密码</button>
                    </div>
                </div>

                <!-- 步骤3：完成 -->
                <div class="form-step step-success" id="step3">
                    <div class="success-icon">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h3>密码重置成功</h3>
                    <p>您可以使用新密码登录账号</p>
                    <a href="login.html" class="btn-primary btn-full">返回登录</a>
                </div>
            </form>

            <div class="back-login">
                <a href="login.html"><i class="bi bi-arrow-left"></i> 返回登录</a>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 织里镇童装产业协同管理平台 版权所有 浙ICP备XXXXXXXX号</p>
            </div>
        </div>
    </footer>

    <script src="../js/auth-header.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
