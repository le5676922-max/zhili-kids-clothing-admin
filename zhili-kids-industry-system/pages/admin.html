<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 织里镇童装产业协同管理平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; }
        
        /* 布局 */
        .admin-layout { display: flex; min-height: 100vh; }
        .admin-sidebar {
            width: 240px;
            background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
            color: #fff;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .admin-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .admin-sidebar-header h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .admin-sidebar-header p {
            font-size: 12px;
            opacity: 0.7;
        }
        .admin-nav { padding: 15px 0; }
        .admin-nav-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: #bdc3c9;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .admin-nav-item:hover, .admin-nav-item.active {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-left-color: #3498db;
        }
        .admin-nav-item i { margin-right: 12px; font-size: 18px; }
        
        .admin-main {
            flex: 1;
            margin-left: 240px;
            padding: 20px;
        }
        
        /* 顶部 */
        .admin-header {
            background: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-header h1 { font-size: 20px; color: #2c3e50; }
        .admin-user-info { display: flex; align-items: center; gap: 15px; }
        .admin-user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }
        .admin-user-info .logout-btn {
            padding: 6px 16px;
            border: 1px solid #e74c3c;
            background: #fff;
            color: #e74c3c;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .admin-user-info .logout-btn:hover {
            background: #e74c3c;
            color: #fff;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
        }
        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
        }
        .stat-icon.blue { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .stat-icon.green { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .stat-icon.orange { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .stat-icon.red { background: linear-gradient(135deg, #fa709a, #fee140); color: #fff; }
        .stat-info h3 { font-size: 28px; color: #2c3e50; font-weight: bold; }
        .stat-info p { font-size: 14px; color: #7f8c8d; margin-top: 4px; }
        
        /* 内容区 */
        .admin-content { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .admin-content-header {
            padding: 20px 25px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-content-header h2 { font-size: 16px; color: #2c3e50; }
        
        /* 标签页 */
        .admin-tabs { display: flex; border-bottom: 1px solid #ecf0f1; padding: 0 25px; }
        .admin-tab {
            padding: 15px 20px;
            color: #7f8c8d;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .admin-tab:hover { color: #3498db; }
        .admin-tab.active {
            color: #3498db;
            border-bottom-color: #3498db;
        }
        
        /* 表格 */
        .admin-table-wrap { padding: 20px 25px; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }
        .admin-table th { color: #7f8c8d; font-weight: 500; font-size: 13px; background: #f8f9fa; }
        .admin-table td { color: #2c3e50; font-size: 14px; }
        .admin-table tr:hover td { background: #f8f9fa; }
        
        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.pending { background: #fff3cd; color: #856404; }
        .status-badge.approved { background: #d4edda; color: #155724; }
        .status-badge.rejected { background: #f8d7da; color: #721c24; }
        
        /* 按钮 */
        .btn-action {
            padding: 5px 12px;
            border: 1px solid #3498db;
            background: #fff;
            color: #3498db;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #3498db; color: #fff; }
        .btn-action.danger { border-color: #e74c3c; color: #e74c3c; }
        .btn-action.danger:hover { background: #e74c3c; color: #fff; }
        .btn-action.success { border-color: #27ae60; color: #27ae60; }
        .btn-action.success:hover { background: #27ae60; color: #fff; }
        
        /* 分页 */
        .admin-pagination {
            padding: 20px 25px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .page-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .page-btn:hover { border-color: #3498db; color: #3498db; }
        .page-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
        
        /* 筛选 */
        .filter-bar { display: flex; gap: 15px; align-items: center; }
        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }
        .filter-bar select:focus, .filter-bar input:focus {
            outline: none;
            border-color: #3498db;
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #fff;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-size: 16px; color: #2c3e50; }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #7f8c8d;
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .license-preview-img {
            max-width: 100%;
            max-height: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        .empty-state i { font-size: 48px; margin-bottom: 15px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2>管理后台</h2>
                <p>织里镇童装产业系统</p>
            </div>
            <nav class="admin-nav">
                <a class="admin-nav-item active" data-tab="dashboard">
                    <i class="bi bi-grid-1x2"></i>仪表盘
                </a>
                <a class="admin-nav-item" data-tab="users">
                    <i class="bi bi-people"></i>用户管理
                </a>
                <a class="admin-nav-item" data-tab="enterprises">
                    <i class="bi bi-building"></i>企业审核
                </a>
            </nav>
        </aside>
        
        <!-- 主内容 -->
        <main class="admin-main">
            <!-- 顶部 -->
            <header class="admin-header">
                <h1 id="pageTitle">仪表盘</h1>
                <div class="admin-user-info">
                    <div class="avatar" id="adminAvatar">管</div>
                    <span id="adminNickname">管理员</span>
                    <button class="logout-btn" id="logoutBtn">退出登录</button>
                </div>
            </header>
            
            <!-- 仪表盘 -->
            <div id="tab-dashboard" class="admin-tab-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="bi bi-people-fill"></i></div>
                        <div class="stat-info">
                            <h3 id="statTotal">0</h3>
                            <p>总用户数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="bi bi-person-fill"></i></div>
                        <div class="stat-info">
                            <h3 id="statPersonal">0</h3>
                            <p>个人用户</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="bi bi-building"></i></div>
                        <div class="stat-info">
                            <h3 id="statEnterprise">0</h3>
                            <p>企业用户</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="bi bi-hourglass-split"></i></div>
                        <div class="stat-info">
                            <h3 id="statPending">0</h3>
                            <p>待审核</p>
                        </div>
                    </div>
                </div>
                
                <div class="admin-content">
                    <div class="admin-content-header">
                        <h2>最近注册用户</h2>
                    </div>
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>类型</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                </tr>
                            </thead>
                            <tbody id="recentUsersTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- 用户管理 -->
            <div id="tab-users" class="admin-tab-content hidden">
                <div class="admin-content">
                    <div class="admin-content-header">
                        <h2>用户列表</h2>
                        <div class="filter-bar">
                            <select id="userTypeFilter">
                                <option value="">全部类型</option>
                                <option value="1">个人用户</option>
                                <option value="2">企业用户</option>
                            </select>
                            <button class="btn-action" id="refreshUsersBtn">刷新</button>
                        </div>
                    </div>
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户昵称</th>
                                    <th>邮箱</th>
                                    <th>类型</th>
                                    <th>企业名称</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable"></tbody>
                        </table>
                    </div>
                    <div class="admin-pagination" id="usersPagination"></div>
                </div>
            </div>
            
            <!-- 企业审核 -->
            <div id="tab-enterprises" class="admin-tab-content hidden">
                <div class="admin-content">
                    <div class="admin-tabs">
                        <div class="admin-tab active" data-status="0">待审核</div>
                        <div class="admin-tab" data-status="1">已通过</div>
                        <div class="admin-tab" data-status="2">已拒绝</div>
                    </div>
                    <div class="admin-content-header">
                        <h2>企业审核列表</h2>
                        <div class="filter-bar">
                            <button class="btn-action" id="refreshEnterprisesBtn">刷新</button>
                        </div>
                    </div>
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>企业名称</th>
                                    <th>营业执照号</th>
                                    <th>联系人邮箱</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="enterprisesTable"></tbody>
                        </table>
                    </div>
                    <div class="admin-pagination" id="enterprisesPagination"></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 企业详情模态框 -->
    <div class="modal-overlay" id="enterpriseModal">
        <div class="modal">
            <div class="modal-header">
                <h3>企业详情</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body" id="enterpriseModalBody"></div>
            <div class="modal-footer" id="enterpriseModalFooter"></div>
        </div>
    </div>
    
    <!-- 修改密码模态框 -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <div class="modal-header">
                <h3>修改用户密码</h3>
                <button class="modal-close" id="closePasswordModal">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 15px; color: #666;">正在修改用户: <strong id="passwordModalUsername"></strong></p>
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" placeholder="请输入新密码" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入新密码" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div id="passwordError" class="error-message" style="display: none; color: #e74c3c; margin-top: 10px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-action" id="cancelPasswordBtn">取消</button>
                <button class="btn-action success" id="confirmPasswordBtn">确认修改</button>
            </div>
        </div>
    </div>
    
    <script src="../js/api-config.js"></script>
    <script src="../js/common.js"></script>
    <script>
        var API_BASE = window.ZhiliApi.apiAdmin();
        var TOKEN_KEY = 'adminToken';
        var USER_INFO_KEY = 'adminUserInfo';
        var currentTab = 'dashboard';
        var enterpriseStatusFilter = 0;
        
        // 检查登录
        function checkLogin() {
            var token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                window.location.href = 'admin-login.html';
                return null;
            }
            var userInfo = localStorage.getItem(USER_INFO_KEY);
            if (userInfo) {
                try { userInfo = JSON.parse(userInfo); } catch(e) { userInfo = null; }
            }
            return { token: token, userInfo: userInfo };
        }
        
        var auth = checkLogin();
        if (!auth) throw new Error('未登录');
        
        var token = auth.token;
        var userInfo = auth.userInfo;
        
        // 初始化头部
        if (userInfo) {
            document.getElementById('adminNickname').textContent = userInfo.nickname || '管理员';
            if (userInfo.nickname) {
                document.getElementById('adminAvatar').textContent = userInfo.nickname.charAt(0);
            }
        }
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_INFO_KEY);
            window.location.href = 'admin-login.html';
        });
        
        // API 请求
        function apiFetch(url, options) {
            return fetch(API_BASE + url, Object.assign({}, options, {
                headers: Object.assign({}, { 'Content-Type': 'application/json' }, options.headers, { 'Authorization': 'Bearer ' + token })
            })).then(function(r) { return r.json(); });
        }
        
        // 标签页切换
        document.querySelectorAll('.admin-nav-item').forEach(function(item) {
            item.addEventListener('click', function() {
                var tab = this.getAttribute('data-tab');
                switchTab(tab);
            });
        });
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.admin-nav-item').forEach(function(i) {
                i.classList.toggle('active', i.getAttribute('data-tab') === tab);
            });
            document.querySelectorAll('.admin-tab-content').forEach(function(c) {
                c.classList.add('hidden');
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            
            var titles = { dashboard: '仪表盘', users: '用户管理', enterprises: '企业审核' };
            document.getElementById('pageTitle').textContent = titles[tab] || '仪表盘';
            
            if (tab === 'dashboard') loadStats();
            else if (tab === 'users') loadUsers();
            else if (tab === 'enterprises') loadEnterprises();
        }
        
        // 加载统计
        function loadStats() {
            apiFetch('/admin/stats', {}).then(function(res) {
                if (res.code !== 200) { alert(res.message || '加载失败'); return; }
                var d = res.data;
                document.getElementById('statTotal').textContent = d.totalUsers || 0;
                document.getElementById('statPersonal').textContent = d.personalUsers || 0;
                document.getElementById('statEnterprise').textContent = d.enterpriseUsers || 0;
                document.getElementById('statPending').textContent = d.pendingEnterprises || 0;
                // 最近用户
                apiFetch('/admin/users?page=1&pageSize=5', {}).then(function(r) {
                    if (r.code === 200 && r.data && r.data.list) {
                        renderRecentUsers(r.data.list);
                    }
                });
            });
        }
        
        function renderRecentUsers(list) {
            var tbody = document.getElementById('recentUsersTable');
            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><i class="bi bi-inbox"></i><p>暂无数据</p></td></tr>';
                return;
            }
            tbody.innerHTML = list.map(function(u) {
                var typeLabel = u.userType === 1 ? '个人' : (u.userType === 2 ? '企业' : '管理员');
                var statusLabel = u.userType === 2 ? getStatusBadge(u.enterpriseStatus) : '-';
                return '<tr><td>' + escapeHtml(u.nickname || u.email) + '</td><td>' + typeLabel + '</td><td>' + statusLabel + '</td><td>' + formatDate(u.createdAt) + '</td></tr>';
            }).join('');
        }
        
        function getStatusBadge(status) {
            if (status === 0) return '<span class="status-badge pending">待审核</span>';
            if (status === 1) return '<span class="status-badge approved">已通过</span>';
            if (status === 2) return '<span class="status-badge rejected">已拒绝</span>';
            return '-';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        
        function formatDate(str) {
            if (!str) return '-';
            var d = new Date(str);
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        }
        
        function pad(n) { return n < 10 ? '0' + n : n; }
        
        // 用户管理
        var usersPage = 1;
        document.getElementById('userTypeFilter').addEventListener('change', function() { loadUsers(); });
        document.getElementById('refreshUsersBtn').addEventListener('click', function() { loadUsers(); });
        
        function loadUsers() {
            var type = document.getElementById('userTypeFilter').value;
            var url = '/admin/users?page=' + usersPage + '&pageSize=15' + (type ? '&userType=' + type : '');
            apiFetch(url, {}).then(function(res) {
                if (res.code !== 200) { alert(res.message || '加载失败'); return; }
                renderUsersTable(res.data.list, res.data.total);
            });
        }
        
        function renderUsersTable(list, total) {
            var tbody = document.getElementById('usersTable');
            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="bi bi-inbox"></i><p>暂无数据</p></td></tr>';
                return;
            }
            tbody.innerHTML = list.map(function(u) {
                var typeLabel = u.userType === 1 ? '个人' : (u.userType === 2 ? '企业' : '管理员');
                var entName = u.enterpriseName || '-';
                var status = u.userType === 2 ? getStatusBadge(u.enterpriseStatus) : '-';
                var canDelete = u.userType !== 3 ? '<button class="btn-action danger" onclick="deleteUser(\'' + u.id + '\')">删除</button>' : '';
                var canManage = u.userType !== 3 ? '<button class="btn-action" onclick="showChangePasswordModal(\'' + u.id + '\', \'' + escapeHtml(u.nickname || u.email) + '\')">改密</button>' : '';
                return '<tr><td>' + u.id.slice(0, 8) + '</td><td>' + escapeHtml(u.nickname) + '</td><td>' + escapeHtml(u.email) + '</td><td>' + typeLabel + '</td><td>' + escapeHtml(entName) + '</td><td>' + status + '</td><td>' + formatDate(u.createdAt) + '</td><td>' + canManage + canDelete + '</td></tr>';
            }).join('');
            renderPagination('usersPagination', total, 15, usersPage, function(p) { usersPage = p; loadUsers(); });
        }
        
        window.deleteUser = function(id) {
            if (!confirm('确定要删除该用户吗？')) return;
            apiFetch('/admin/users/' + id, { method: 'DELETE' }).then(function(res) {
                if (res.code === 200) { alert('删除成功'); loadUsers(); }
                else { alert(res.message || '删除失败'); }
            });
        };
        
        // 修改密码相关
        var currentChangePasswordUserId = null;
        
        window.showChangePasswordModal = function(userId, username) {
            currentChangePasswordUserId = userId;
            document.getElementById('passwordModalUsername').textContent = username;
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('passwordModal').classList.add('show');
        };
        
        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('show');
            currentChangePasswordUserId = null;
        }
        
        document.getElementById('closePasswordModal').onclick = closePasswordModal;
        document.getElementById('cancelPasswordBtn').onclick = closePasswordModal;
        document.getElementById('passwordModal').addEventListener('click', function(e) {
            if (e.target === this) closePasswordModal();
        });
        
        document.getElementById('confirmPasswordBtn').addEventListener('click', function() {
            var newPwd = document.getElementById('newPassword').value;
            var confirmPwd = document.getElementById('confirmPassword').value;
            var errorEl = document.getElementById('passwordError');
            
            if (!newPwd || newPwd.length < 6) {
                errorEl.textContent = '密码长度至少6位';
                errorEl.style.display = 'block';
                return;
            }
            if (newPwd !== confirmPwd) {
                errorEl.textContent = '两次输入的密码不一致';
                errorEl.style.display = 'block';
                return;
            }
            
            errorEl.style.display = 'none';
            
            apiFetch('/admin/users/' + currentChangePasswordUserId + '/password', {
                method: 'PUT',
                body: JSON.stringify({ newPassword: newPwd })
            }).then(function(res) {
                if (res.code === 200) {
                    alert('密码修改成功');
                    closePasswordModal();
                } else {
                    errorEl.textContent = res.message || '修改失败';
                    errorEl.style.display = 'block';
                }
            });
        });
        
        // 企业审核
        document.querySelectorAll('#tab-enterprises .admin-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('#tab-enterprises .admin-tab').forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                enterpriseStatusFilter = parseInt(this.getAttribute('data-status'));
                loadEnterprises();
            });
        });
        document.getElementById('refreshEnterprisesBtn').addEventListener('click', function() { loadEnterprises(); });
        
        var enterprisesPage = 1;
        function loadEnterprises() {
            var url = '/admin/users?page=' + enterprisesPage + '&pageSize=15&userType=2&status=' + enterpriseStatusFilter;
            apiFetch(url, {}).then(function(res) {
                if (res.code !== 200) { alert(res.message || '加载失败'); return; }
                renderEnterprisesTable(res.data.list, res.data.total);
            });
        }
        
        function renderEnterprisesTable(list, total) {
            var tbody = document.getElementById('enterprisesTable');
            if (!list || list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="bi bi-inbox"></i><p>暂无数据</p></td></tr>';
                return;
            }
            tbody.innerHTML = list.map(function(u) {
                var status = getStatusBadge(u.enterpriseStatus);
                var actions = '';
                if (u.enterpriseStatus === 0) {
                    actions = '<button class="btn-action success" onclick="showEnterpriseDetail(\'' + u.id + '\', 1)">通过</button>' +
                              '<button class="btn-action danger" onclick="showEnterpriseDetail(\'' + u.id + '\', 2)">拒绝</button>';
                } else {
                    actions = '<button class="btn-action" onclick="showEnterpriseDetail(\'' + u.id + '\')">查看</button>';
                }
                return '<tr><td>' + escapeHtml(u.enterpriseName) + '</td><td>' + escapeHtml(u.enterpriseLicense) + '</td><td>' + escapeHtml(u.email) + '</td><td>' + status + '</td><td>' + formatDate(u.createdAt) + '</td><td>' + actions + '</td></tr>';
            }).join('');
            renderPagination('enterprisesPagination', total, 15, enterprisesPage, function(p) { enterprisesPage = p; loadEnterprises(); });
        }
        
        window.showEnterpriseDetail = function(id, action) {
            apiFetch('/admin/users?page=1&pageSize=100', {}).then(function(res) {
                if (res.code !== 200) return;
                var u = res.data.list.find(function(x) { return x.id === id; });
                if (!u) return;
                
                var body = document.getElementById('enterpriseModalBody');
                var footer = document.getElementById('enterpriseModalFooter');
                
                var imgHtml = u.licenseImageUrl ? '<img class="license-preview-img" src="' + escapeHtml(u.licenseImageUrl) + '" alt="营业执照">' : '<p>未上传营业执照</p>';
                
                body.innerHTML = '<p><strong>企业名称：</strong>' + escapeHtml(u.enterpriseName) + '</p>' +
                    '<p><strong>营业执照号：</strong>' + escapeHtml(u.enterpriseLicense) + '</p>' +
                    '<p><strong>联系人邮箱：</strong>' + escapeHtml(u.email) + '</p>' +
                    '<p><strong>用户昵称：</strong>' + escapeHtml(u.nickname) + '</p>' +
                    '<p><strong>注册时间：</strong>' + formatDate(u.createdAt) + '</p>' +
                    '<p><strong>营业执照：</strong></p>' + imgHtml;
                
                if (action === 1 || action === 2) {
                    footer.innerHTML = '<button class="btn-action" id="modalCancel">取消</button>' +
                        '<button class="btn-action ' + (action === 1 ? 'success' : 'danger') + '" id="modalConfirm">' + (action === 1 ? '确认通过' : '确认拒绝') + '</button>';
                    document.getElementById('modalConfirm').onclick = function() { updateEnterpriseStatus(id, action); };
                } else {
                    footer.innerHTML = '<button class="btn-action" id="modalClose">关闭</button>';
                }
                
                document.getElementById('modalCancel') && (document.getElementById('modalCancel').onclick = closeModal);
                document.getElementById('modalClose') && (document.getElementById('modalClose').onclick = closeModal);
                
                document.getElementById('enterpriseModal').classList.add('show');
            });
        };
        
        function closeModal() {
            document.getElementById('enterpriseModal').classList.remove('show');
        }
        document.getElementById('closeModal').onclick = closeModal;
        document.getElementById('enterpriseModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        window.updateEnterpriseStatus = function(id, status) {
            apiFetch('/admin/users/' + id + '/status', {
                method: 'PUT',
                body: JSON.stringify({ enterpriseStatus: status })
            }).then(function(res) {
                if (res.code === 200) {
                    alert(status === 1 ? '已通过审核' : '已拒绝');
                    closeModal();
                    loadEnterprises();
                    loadStats();
                } else {
                    alert(res.message || '操作失败');
                }
            });
        };
        
        function renderPagination(elId, total, pageSize, currentPage, onPageChange) {
            var el = document.getElementById(elId);
            if (!el) return;
            var pages = Math.ceil(total / pageSize);
            if (pages <= 1) { el.innerHTML = ''; return; }
            var html = '';
            for (var i = 1; i <= pages; i++) {
                html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '">' + i + '</button>';
            }
            el.innerHTML = html;
            el.querySelectorAll('.page-btn').forEach(function(btn, idx) {
                btn.onclick = function() { onPageChange(idx + 1); };
            });
        }
        
        // 初始化
        loadStats();
    </script>
</body>
</html>
