<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 织里镇童装产业协同管理平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
    <link rel="stylesheet" href="../css/change-password.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../images/logo.png" alt="织里镇童装产业协同管理平台">
                <h1>织里镇童装产业协同管理平台</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">首页</a></li>
                    <li><a href="enterprise.html">企业信息</a></li>
                    <li><a href="supply-chain.html">供应链协同</a></li>
                    <li><a href="product.html">产品展示</a></li>
                    <li><a href="market.html">市场信息</a></li>
                    <li><a href="recruitment.html">人才招聘</a></li>
                    <li><a href="training.html">人才培育</a></li>
                    <li><a href="data-center.html">数据中心</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <div class="user-info-guest">
                    <a href="login.html" class="btn btn-login">登录</a>
                    <a href="register.html" class="btn btn-register">注册</a>
                </div>
            </div>
        </div>
    </header>

    <main class="change-password-container">
        <div class="change-password-box">
            <div class="change-password-header">
                <h2>修改密码</h2>
                <p>请选择修改方式并完成验证</p>
            </div>

            <!-- 切换方式 -->
            <div class="change-password-tabs">
                <button type="button" class="tab-btn active" data-tab="by-old">原密码修改</button>
                <button type="button" class="tab-btn" data-tab="by-email">通过邮箱修改</button>
            </div>

            <!-- 方式一：原密码修改 -->
            <div class="tab-panel active" id="panel-by-old">
                <form class="change-password-form" id="formByOld">
                    <div class="form-group">
                        <label for="old-password">原密码</label>
                        <div class="input-with-icon">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="old-password" name="oldPassword" placeholder="请输入原密码" required>
                            <i class="bi bi-eye-slash toggle-password" data-target="old-password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="new-password">新密码</label>
                        <div class="input-with-icon">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="new-password" name="newPassword" placeholder="请输入新密码（8-20位）" required>
                            <i class="bi bi-eye-slash toggle-password" data-target="new-password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">确认新密码</label>
                        <div class="input-with-icon">
                            <i class="bi bi-lock"></i>
                            <input type="password" id="confirm-password" name="confirmPassword" placeholder="请再次输入新密码" required>
                            <i class="bi bi-eye-slash toggle-password" data-target="confirm-password"></i>
                        </div>
                    </div>
                    <div id="error-message" class="error-message" style="display:none;"></div>
                    <button type="submit" class="btn-primary btn-full" id="btnSubmitOld">确认修改</button>
                </form>
            </div>

            <!-- 方式二：通过邮箱修改 -->
            <div class="tab-panel" id="panel-by-email">
                <div class="email-tip">
                    <p>通过邮箱验证码可重置密码，无需输入原密码。</p>
                    <a href="forgot-password.html" class="btn-primary btn-full">前往邮箱修改密码</a>
                </div>
            </div>

            <!-- 修改成功 -->
            <div class="tab-panel step-success" id="panel-success" style="display:none;">
                <div class="success-icon">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h3>密码修改成功</h3>
                <p>请使用新密码重新登录</p>
                <a href="login.html" class="btn-primary btn-full">返回登录</a>
            </div>

            <div class="back-link">
                <a href="../index.html"><i class="bi bi-arrow-left"></i> 返回首页</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 织里镇童装产业协同管理平台 版权所有 浙ICP备XXXXXXXX号</p>
            </div>
        </div>
    </footer>

    <script src="../js/auth-header.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/change-password.js"></script>
</body>
</html>
