spring:
  application:
    name: zhili-kids-industry

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # 数据库配置（按宝塔面板创建的数据库信息修改）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/zhili_kids_industry?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: zhili_kids_industry     # 改成你在宝塔创建的数据库用户名
    password: YOUR_DB_PASSWORD        # 改成你的数据库密码

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.java.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET}
  expiration: 43200000

server:
  port: 8080

# 邮件配置（QQ邮箱SMTP，改成你自己的）
spring.mail:
  host: smtp.qq.com
  port: 587
  username: YOUR_QQ_EMAIL@qq.com   # 改成你的QQ邮箱
  password: YOUR_SMTP_AUTH_CODE    # 改成QQ邮箱SMTP授权码
  properties:
    mail.smtp.auth: true
    mail.smtp.starttls.enable: true
    mail.smtp.starttls.required: true

verify-code:
  expire-minutes: 5

# 阿里云 OSS 配置（改成你自己的）
aliyun:
  oss:
    access-key-id: YOUR_ALIYUN_ACCESS_KEY
    access-key-secret: YOUR_ALIYUN_ACCESS_SECRET
    avatar-bucket: zhili-kids-industry-system
    avatar-region: oss-cn-hangzhou
    license-bucket: yingyezhizhao-zhili-kids-system
    license-region: oss-cn-beijing

# Redis 配置（按宝塔安装的Redis修改）
spring.data.redis:
  host: 127.0.0.1
  port: 6379
  password:                # 如果Redis有密码，填在这里
  database: 0
  timeout: 5000

# DeepSeek API 配置
deepseek:
  api-key: YOUR_DEEPSEEK_API_KEY

# 阿里云 DashScope API 配置
dashscope:
  api-key: YOUR_DASHSCOPE_API_KEY

logging:
  level:
    com.example.java: info
