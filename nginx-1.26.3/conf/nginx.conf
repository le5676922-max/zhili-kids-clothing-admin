# Nginx 配置文件 - 致里儿童产业系统
# Windows 版本

worker_processes  auto;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip压缩
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 上游后端服务器 (Java后端API)
    upstream java_backend {
        server localhost:8080;
    }

    # 前端静态文件服务器
    server {
        listen       8081;
        server_name  localhost;

        # 前端静态文件根目录
        root   C:/Users/zjl/Desktop/Project/zhili-kids-industry-system;
        index  index.html index.htm;

        # 静态资源缓存（开发阶段使用短缓存，生产环境可改回 30d + immutable）
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # API请求代理到Java后端
        location /api/ {
            proxy_pass http://java_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 文件上传代理
        location /upload/ {
            proxy_pass http://java_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket 反代（工单聊天 / 招聘沟通）
        location /ws {
            proxy_pass http://java_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # 图片目录
        location /images/ {
            alias C:/Users/zjl/Desktop/Project/zhili-kids-industry-system/images/;
            expires 30d;
        }

        # 静态页面目录
        location /pages/ {
            alias C:/Users/zjl/Desktop/Project/zhili-kids-industry-system/pages/;
        }

        # CSS目录
        location /css/ {
            alias C:/Users/zjl/Desktop/Project/zhili-kids-industry-system/css/;
        }

        # JS目录
        location /js/ {
            alias C:/Users/zjl/Desktop/Project/zhili-kids-industry-system/js/;
        }

        # SPA路由支持
        location / {
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   C:/Users/zjl/Desktop/Project/zhili-kids-industry-system;
        }
    }
}
